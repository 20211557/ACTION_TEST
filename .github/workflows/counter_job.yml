name: Serverless Auto Counter

on:
  schedule:
    # 깃허브 액션 제한상 최소 주기인 5분마다 실행 설정
    - cron: '*/5 * * * *'
  workflow_dispatch: # 👈 중요: 깃허브 웹에서 'Run workflow' 버튼으로 즉시 테스트 가능하게 함

jobs:
  increment-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Requests Library
      run: pip install requests

    - name: Run Python Counter Script
      run: python counter.py

    - name: Deploy to Firebase Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
        projectId: test-b30a4 # ⚠️ 본인의 Firebase 프로젝트 ID로 변경
        channelId: live