name: Hourly Regional Weather Fetch & Deploy

on:
  schedule:
    # 분 시 일 월 요일
    # 매시간 0분에 실행 (UTC 기준, 한국 시간 매시 정각)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 테스트용 버튼 활성화

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        #cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install firebase-admin

    - name: Run Weather Fetch Script
      run: python counter.py

    - name: Deploy to Firebase Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
        projectId: test-b30a4 # ⚠️ 본인의 Firebase 프로젝트 ID로 변경 필수
        channelId: live