name: Daily Regional Prediction & Deploy

on:
  schedule:
    # 분 시 일 월 요일
    # 매일 1회 실행 (UTC 00:00 = KST 09:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 테스트용 버튼 활성화

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        #cache: 'pip'

    - name: Set up Node (for firebase-tools)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        npm install -g firebase-tools

    - name: Create Firebase Service Account JSON
      run: |
        cat << 'EOF' > firebase_service_account.json
        ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        EOF

    - name: Run Daily Prediction Script
      run: python predict.py

    - name: Deploy to Firebase Hosting
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase_service_account.json
      run: |
        firebase deploy --only hosting --project test-b30a4 --non-interactive

    - name: Clean up Credentials
      if: always() # 스크립트가 성공하든 실패하든 무조건 실행
      run: |
        # 비밀키 파일 삭제
        rm -f firebase_service_account.json
