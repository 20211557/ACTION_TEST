name: Daily Regional Prediction & Deploy

on:
  schedule:
    # 분 시 일 월 요일
    # 매일 1회 실행 (UTC 00:00 = KST 09:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 테스트용 버튼 활성화

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        #cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Firebase Service Account JSON
      run: |
        cat << 'EOF' > firebase_service_account.json
        ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        EOF

    - name: Run Daily Prediction Script
      run: python predict.py

    - name: Clean up Credentials
      if: always() # 스크립트가 성공하든 실패하든 무조건 실행
      run: |
        # 가상 머신이 종료되기 전에 혹시 모를 흔적을 지우기 위해 비밀키 파일을 삭제합니다.
        rm -f firebase_service_account.json

    - name: Deploy to Firebase Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
        projectId: test-b30a4 # ⚠️ 본인의 Firebase 프로젝트 ID로 변경 필수
        channelId: live
